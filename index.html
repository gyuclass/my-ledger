<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>개인 가계부 MVP</title>
  <!-- SEO 메타 태그 -->
  <meta name="description" content="엑셀 가계부 연동 및 시각화를 지원하는 미려한 개인 가계부 웹앱 MVP">
  <meta name="author" content="Antigravity">
  
  <!-- 스타일시트 로드 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f5f3ff',
              100: '#ede9fe',
              500: '#6366f1',
              600: '#4f46e5',
              700: '#4338ca',
            }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="styles.css">
  
  <!-- CDN 외부 라이브러리 (Chart.js & Lucide 아이콘 & SheetJS) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 text-slate-800">

  <!-- 전체 레이아웃 컨테이너 -->
  <div class="min-h-screen flex flex-col">
    
    <!-- 네비게이션 헤더 -->
    <header class="sticky top-0 z-40 w-full glass-card border-b border-slate-200">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16 items-center">
          <!-- 로고 영역 -->
          <div class="flex items-center space-x-3">
            <div class="bg-gradient-to-tr from-indigo-500 to-purple-600 p-2.5 rounded-xl shadow-md text-white">
              <i data-lucide="wallet" class="w-6 h-6"></i>
            </div>
            <div>
              <span class="text-xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">FinFlow</span>
              <span class="text-xs block text-slate-500 font-medium">개인 가계부 MVP</span>
            </div>
          </div>
          
          <!-- 탭 메뉴 (데스크톱 및 태블릿) -->
          <nav class="hidden md:flex space-x-1 lg:space-x-2">
            <button id="tab-dashboard" class="tab-btn active px-4 py-2 text-sm font-semibold rounded-lg text-indigo-600 hover:bg-indigo-50/50" onclick="switchTab('dashboard')">
              <span class="flex items-center gap-1.5"><i data-lucide="layout-dashboard" class="w-4 h-4"></i> 대시보드</span>
            </button>
            <button id="tab-expenses" class="tab-btn px-4 py-2 text-sm font-semibold rounded-lg text-slate-600 hover:text-indigo-600 hover:bg-indigo-50/50" onclick="switchTab('expenses')">
              <span class="flex items-center gap-1.5"><i data-lucide="credit-card" class="w-4 h-4"></i> 지출 관리</span>
            </button>
            <button id="tab-income" class="tab-btn px-4 py-2 text-sm font-semibold rounded-lg text-slate-600 hover:text-indigo-600 hover:bg-indigo-50/50" onclick="switchTab('income')">
              <span class="flex items-center gap-1.5"><i data-lucide="trending-up" class="w-4 h-4"></i> 수입 관리</span>
            </button>
            <button id="tab-yearly" class="tab-btn px-4 py-2 text-sm font-semibold rounded-lg text-slate-600 hover:text-indigo-600 hover:bg-indigo-50/50" onclick="switchTab('yearly')">
              <span class="flex items-center gap-1.5"><i data-lucide="table" class="w-4 h-4"></i> 연간 표</span>
            </button>
            <button id="tab-settings" class="tab-btn px-4 py-2 text-sm font-semibold rounded-lg text-slate-600 hover:text-indigo-600 hover:bg-indigo-50/50" onclick="switchTab('settings')">
              <span class="flex items-center gap-1.5"><i data-lucide="settings" class="w-4 h-4"></i> 설정</span>
            </button>
          </nav>
          
          <!-- 우측 헤더 영역 (연도 퀵 셀렉터) -->
          <div class="flex items-center space-x-2">
            <span class="text-xs text-slate-400 font-medium">기준 연도:</span>
            <select id="global-year-select" class="bg-white border border-slate-300 rounded-lg py-1 px-3 text-sm font-semibold text-slate-700 focus:outline-none focus:border-indigo-500" onchange="changeGlobalYear(this.value)">
              <option value="2025">2025년</option>
              <option value="2026" selected>2026년</option>
              <option value="2027">2027년</option>
            </select>
          </div>
        </div>
      </div>
      
      <!-- 모바일 탭 바 (하단/모바일 화면 전용) -->
      <div class="md:hidden flex justify-around border-t border-slate-200 bg-white/90 py-2">
        <button id="m-tab-dashboard" class="flex flex-col items-center text-xs font-semibold text-indigo-600" onclick="switchTab('dashboard')">
          <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
          <span>대시보드</span>
        </button>
        <button id="m-tab-expenses" class="flex flex-col items-center text-xs font-semibold text-slate-500" onclick="switchTab('expenses')">
          <i data-lucide="credit-card" class="w-5 h-5"></i>
          <span>지출</span>
        </button>
        <button id="m-tab-income" class="flex flex-col items-center text-xs font-semibold text-slate-500" onclick="switchTab('income')">
          <i data-lucide="trending-up" class="w-5 h-5"></i>
          <span>수입</span>
        </button>
        <button id="m-tab-yearly" class="flex flex-col items-center text-xs font-semibold text-slate-500" onclick="switchTab('yearly')">
          <i data-lucide="table" class="w-5 h-5"></i>
          <span>연간표</span>
        </button>
        <button id="m-tab-settings" class="flex flex-col items-center text-xs font-semibold text-slate-500" onclick="switchTab('settings')">
          <i data-lucide="settings" class="w-5 h-5"></i>
          <span>설정</span>
        </button>
      </div>
    </header>

    <!-- 메인 컨텐츠 영역 -->
    <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
      
      <!-- 탭 컨텐츠 컨테이너 (app.js가 동적으로 각 탭 내용을 그림) -->
      <div id="tab-content" class="space-y-6">
        <!-- 렌더링 대기 스피너 -->
        <div class="flex items-center justify-center h-64">
          <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
        </div>
      </div>
      
    </main>

    <!-- 푸터 -->
    <footer class="bg-white border-t border-slate-200 py-6">
      <div class="max-w-7xl mx-auto px-4 text-center text-xs text-slate-400">
        <p>© 2026 FinFlow. 개인 전용 로컬 가계부 MVP. 모든 데이터는 브라우저 내부 LocalStorage에 안전하게 저장됩니다.</p>
      </div>
    </footer>
  </div>

  <!-- ========================================== -->
  <!-- 모달 창: 지출 수정 모달 -->
  <!-- ========================================== -->
  <div id="expense-modal" class="fixed inset-0 z-50 hidden bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl max-w-md w-full shadow-2xl overflow-hidden transform transition-all">
      <div class="px-6 py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white flex justify-between items-center">
        <h3 class="text-lg font-bold flex items-center gap-2"><i data-lucide="edit-3" class="w-5 h-5"></i> 지출 항목 수정</h3>
        <button onclick="closeExpenseModal()" class="text-white/80 hover:text-white"><i data-lucide="x" class="w-6 h-6"></i></button>
      </div>
      <form id="expense-edit-form" class="p-6 space-y-4" onsubmit="handleExpenseUpdate(event)">
        <input type="hidden" id="edit-expense-id">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1">연도</label>
            <input type="number" id="edit-expense-year" class="w-full px-3 py-2 border rounded-lg text-sm input-premium" required>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1">월</label>
            <input type="number" id="edit-expense-month" min="1" max="12" class="w-full px-3 py-2 border rounded-lg text-sm input-premium" required>
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1">분류</label>
          <select id="edit-expense-category" class="w-full px-3 py-2 border rounded-lg text-sm input-premium" required></select>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1">항목명</label>
          <input type="text" id="edit-expense-name" class="w-full px-3 py-2 border rounded-lg text-sm input-premium" placeholder="예: 메리츠 보험" required>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1">금액(원)</label>
          <input type="number" id="edit-expense-amount" class="w-full px-3 py-2 border rounded-lg text-sm input-premium" placeholder="숫자만 입력" required>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1">지출일</label>
            <input type="text" id="edit-expense-day" class="w-full px-3 py-2 border rounded-lg text-sm input-premium" placeholder="예: 5일, 만기">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1">결제수단</label>
            <select id="edit-expense-method" class="w-full px-3 py-2 border rounded-lg text-sm input-premium"></select>
          </div>
        </div>
        <div class="flex items-center space-x-2 pt-2">
          <input type="checkbox" id="edit-expense-fixed" class="w-4 h-4 text-indigo-600 border-slate-300 rounded focus:ring-indigo-500">
          <label for="edit-expense-fixed" class="text-xs font-bold text-slate-600">매월 반복되는 고정지출입니다.</label>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1">메모</label>
          <textarea id="edit-expense-memo" rows="2" class="w-full px-3 py-2 border rounded-lg text-sm input-premium" placeholder="상세 내용 메모"></textarea>
        </div>
        <div class="flex space-x-3 pt-4">
          <button type="button" onclick="closeExpenseModal()" class="flex-1 py-2 px-4 bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-semibold rounded-lg transition">취소</button>
          <button type="submit" class="flex-1 py-2 px-4 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white text-sm font-semibold rounded-lg shadow-lg transition">수정 완료</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ========================================== -->
  <!-- 모달 창: 수입 수정 모달 -->
  <!-- ========================================== -->
  <div id="income-modal" class="fixed inset-0 z-50 hidden bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl max-w-md w-full shadow-2xl overflow-hidden transform transition-all">
      <div class="px-6 py-4 bg-gradient-to-r from-emerald-500 to-teal-600 text-white flex justify-between items-center">
        <h3 class="text-lg font-bold flex items-center gap-2"><i data-lucide="edit-3" class="w-5 h-5"></i> 수입 항목 수정</h3>
        <button onclick="closeIncomeModal()" class="text-white/80 hover:text-white"><i data-lucide="x" class="w-6 h-6"></i></button>
      </div>
      <form id="income-edit-form" class="p-6 space-y-4" onsubmit="handleIncomeUpdate(event)">
        <input type="hidden" id="edit-income-id">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1">연도</label>
            <input type="number" id="edit-income-year" class="w-full px-3 py-2 border rounded-lg text-sm input-premium" required>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1">월</label>
            <input type="number" id="edit-income-month" min="1" max="12" class="w-full px-3 py-2 border rounded-lg text-sm input-premium" required>
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1">수입명</label>
          <input type="text" id="edit-income-name" class="w-full px-3 py-2 border rounded-lg text-sm input-premium" placeholder="예: 급여, 보너스" required>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1">금액(원)</label>
          <input type="number" id="edit-income-amount" class="w-full px-3 py-2 border rounded-lg text-sm input-premium" placeholder="숫자만 입력" required>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1">메모</label>
          <textarea id="edit-income-memo" rows="2" class="w-full px-3 py-2 border rounded-lg text-sm input-premium" placeholder="상세 내용 메모(예: 연차 정산분 포함)"></textarea>
        </div>
        <div class="flex space-x-3 pt-4">
          <button type="button" onclick="closeIncomeModal()" class="flex-1 py-2 px-4 bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-semibold rounded-lg transition">취소</button>
          <button type="submit" class="flex-1 py-2 px-4 bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-700 hover:to-teal-700 text-white text-sm font-semibold rounded-lg shadow-lg transition">수정 완료</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ========================================== -->
  <!-- 모달 창: 엑셀 업로드 미리보기 모달 -->
  <!-- ========================================== -->
  <div id="excel-modal" class="fixed inset-0 z-50 hidden bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl max-w-4xl w-full shadow-2xl overflow-hidden transform transition-all flex flex-col max-h-[85vh]">
      <div class="px-6 py-4 bg-gradient-to-r from-indigo-600 to-purple-600 text-white flex justify-between items-center flex-shrink-0">
        <div>
          <h3 class="text-lg font-bold flex items-center gap-2"><i data-lucide="file-spreadsheet" class="w-5 h-5"></i> 엑셀 업로드 미리보기</h3>
          <p class="text-xs text-indigo-100 font-medium">파싱된 카드 승인 내역을 검토한 뒤 가계부에 일괄 등록합니다.</p>
        </div>
        <button onclick="closeExcelModal()" class="text-white/80 hover:text-white"><i data-lucide="x" class="w-6 h-6"></i></button>
      </div>
      
      <div class="p-6 space-y-4 overflow-y-auto flex-grow">
        <!-- 연도 보정 및 필터 옵션 -->
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-slate-50 p-4 rounded-xl border border-slate-100">
          <div class="flex items-center space-x-2">
            <input type="checkbox" id="excel-force-year" class="w-4 h-4 text-indigo-600 border-slate-300 rounded focus:ring-indigo-500" checked onchange="toggleExcelForceYear(this.checked)">
            <label for="excel-force-year" class="text-xs font-bold text-slate-700">
              추출된 항목의 연도를 현재 기준 연도(<span id="excel-current-year">2026</span>년)로 강제 정렬합니다.
            </label>
          </div>
          <div class="text-xs text-slate-400 font-semibold">
            총 <span id="excel-total-count" class="text-indigo-600 text-sm">0</span>건 중 
            <span id="excel-checked-count" class="text-indigo-600 text-sm">0</span>건 선택됨
          </div>
        </div>

        <!-- 엑셀 데이터 테이블 -->
        <div class="yearly-grid-container max-h-[40vh] overflow-auto">
          <table class="yearly-table min-w-full">
            <thead class="bg-slate-50 text-xs text-slate-600">
              <tr>
                <th class="text-center w-12"><input type="checkbox" id="excel-select-all" class="w-4 h-4 rounded" onchange="toggleExcelSelectAll(this.checked)"></th>
                <th class="text-center w-28">날짜</th>
                <th class="text-left w-48">지출 항목명</th>
                <th class="text-right w-32">금액</th>
                <th class="text-left w-36">분류</th>
                <th class="text-left w-36">결제수단</th>
                <th class="text-left">메모</th>
              </tr>
            </thead>
            <tbody id="excel-preview-tbody" class="text-xs text-slate-700">
              <!-- JS에 의해 동적으로 데이터 삽입 -->
            </tbody>
          </table>
        </div>
      </div>

      <div class="px-6 py-4 bg-slate-50 border-t flex justify-end space-x-3 flex-shrink-0">
        <button type="button" onclick="closeExcelModal()" class="py-2 px-4 bg-white hover:bg-slate-100 border border-slate-200 text-slate-700 text-sm font-semibold rounded-lg transition">취소</button>
        <button type="button" onclick="saveExcelTransactions()" class="py-2 px-5 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white text-sm font-semibold rounded-lg shadow-lg transition">
          선택 지출 일괄 등록
        </button>
      </div>
    </div>
  </div>

  <!-- 비즈니스 로직 스크립트 로드 -->
  <script src="storage.js"></script>
  <script src="app.js"></script>
</body>
</html>
